services:
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        NEW_UID: ${UID:-1000}
        NEW_GID: ${GID:-1000}
        INSTALL_NPM_ASSETS: true
      secrets:
        - npmrc
      ssh:
        - default
    volumes:
      - '.:/src'
      - '/src/node_modules'
      - '/src/static/assets'
      - '${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent'
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    ports:
      - '8006:8006'
      - '5676:5676'
    depends_on: [ 'redis' ]
    networks:
        - default
        - mgo_vad

  redis:
    image: redis:6.2.17
    restart: 'no'
    ports:
      - '16379:16379'
    command: ["redis-server", "--port", "16379"]
    networks:
      - default

  redis-init:
    depends_on: [ 'redis' ]
    image: redis:6.2.17
    restart: 'no'
    command: 'redis-cli -h redis -p 16379 set max:primary_identity_provider tvs'
    networks:
      - default

  brp:
    container_name: brp
    image: ghcr.io/brp-api/personen-mock:2.3.0-latest
    environment:
        - ASPNETCORE_ENVIRONMENT=Release
        - ASPNETCORE_URLS=http://+:5010
    ports:
        - "5010:5010"
    networks:
        - mgo_vad

secrets:
  npmrc:
    file: ~/.npmrc

networks:
    default:
        driver: bridge
    mgo_vad:
        driver: bridge
