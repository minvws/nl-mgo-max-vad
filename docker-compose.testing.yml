services:
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        NEW_UID: ${UID:-1000}
        NEW_GID: ${GID:-1000}
    secrets:
      - npmrc
    volumes:
      - '.:/src'
      - '/src/.venv'
      - '/src/node_modules'
      - '/src/static/assets'
    depends_on: [ 'redis' ]
    command: pytest tests
    networks:
        - mgo_vad_test

  redis:
    image: redis:6.2.17
    restart: 'no'
    ports:
      - '6379'
    command: ["redis-server", "--port", "6379"]
    networks:
        - mgo_vad_test

  redis-init:
    depends_on: [ 'redis' ]
    image: redis:6.2.17
    restart: 'no'
    command: 'redis-cli -h redis -p 6379 set max:primary_identity_provider tvs'

  brp:
    image: ghcr.io/brp-api/personen-mock:2.3.0-latest
    environment:
        - ASPNETCORE_ENVIRONMENT=Release
        - ASPNETCORE_URLS=http://+:5010
    ports:
        - "15010:5010"
    networks:
        - mgo_vad_test

networks:
  mgo_vad_test:
    driver: bridge

secrets:
  npmrc:
    file: ~/.npmrc
